<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vertex Media</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
:root{
  --light:#d4d4dc;
  --mid:#393f4d;
  --dark:#1d1e22;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

body{
  background:var(--dark);
  color:var(--light);
  overflow-x:hidden;
}

/* REMOVE LINK COLORS */
a, a:visited, a:hover, a:active{
  text-decoration:none;
  color:inherit;
}

/* NAV */
.navbar{
  position:fixed;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:15px 40px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  z-index:1000;
}

/* HERO */
.hero{
  position:relative;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:0 20px;
}

.hero video{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
  filter:brightness(0.6);
}

.hero::after{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:-1;
}

.hero h1{
  font-size:55px;
  max-width:800px;
}

.hero p{
  margin-top:15px;
  color:#bbb;
}

/* BUTTON FIX (VISIBLE AF) */
.btn{
  display:inline-block;
  margin-top:30px;
  padding:16px 38px;
  background:#ffffff;
  color:#111;
  border-radius:10px;
  font-weight:700;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.08);
  background:#eaeaea;
}

/* SECTIONS */
section{
  padding:100px 20px;
  max-width:1100px;
  margin:auto;
  text-align:center;
}

/* SERVICES */
.services{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:25px;
}

.card{
  background:var(--mid);
  padding:30px;
  border-radius:14px;
  width:260px;
}

/* CONTACT */
.contact-box{
  display:flex;
  gap:25px;
  justify-content:center;
  flex-wrap:wrap;
}

.contact-item{
  width:70px;
  height:70px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#2a2d36;
  border-radius:14px;
  transition:0.3s;
}

.contact-item i{
  font-size:28px;
}

.contact-item:hover{
  transform:scale(1.1);
  background:#353944;
}

/* FOLLOW TEXT */
.follow-text{
  font-size:18px;
  margin-bottom:15px;
  color:#aaa;
}

/* GLOW CURSOR */
.cursor{
  position:fixed;
  width:20px;
  height:20px;
  border-radius:50%;
  background:white;
  pointer-events:none;
  mix-blend-mode:difference;
  transition:transform 0.1s linear;
  z-index:9999;
}

/* RESPONSIVE */
@media(max-width:768px){
  .hero h1{ font-size:34px; }
}

@media(max-width:480px){
  .hero h1{ font-size:28px; }
}
</style>
</head>

<body>

<div class="cursor" id="cursor"></div>

<!-- HERO -->
<div class="hero">
  <video autoplay muted loop>
    <source src="hero.mp4" type="video/mp4">
  </video>

  <div>
    <h1>We Create Content That Grabs Attention</h1>
    <p>Cinematic videos that make brands impossible to ignore</p>
    <a href="#contact" class="btn">Start Your Project</a>
  </div>
</div>

<!-- SERVICES -->
<section>
  <h2>What We Do</h2>

  <div class="services">
    <div class="card">
      <h3>Content Creation</h3>
      <p>Premium cinematic videos</p>
    </div>

    <div class="card">
      <h3>Social Growth</h3>
      <p>Optimized to go viral</p>
    </div>

    <div class="card">
      <h3>Branding</h3>
      <p>Build a premium identity</p>
    </div>
  </div>
</section>

<!-- CONTACT -->
<section id="contact">
  <h2>Let’s Work</h2>

  <p class="follow-text">Follow Us</p>

  <div class="contact-box">

    <a href="https://www.instagram.com/vertexmedia.gth" class="contact-item">
      <i class="fab fa-instagram"></i>
    </a>

    <a href="https://www.tiktok.com/@vertexmedia.gth" class="contact-item">
      <i class="fab fa-tiktok"></i>
    </a>

    <!-- TWO WHATSAPP ICONS -->
    <a href="https://wa.me/94767768852" class="contact-item">
      <i class="fab fa-whatsapp"></i>
    </a>

    <a href="https://wa.me/94766518001" class="contact-item">
      <i class="fab fa-whatsapp"></i>
    </a>

    <a href="mailto:yourgmail@gmail.com" class="contact-item">
      <i class="fas fa-envelope"></i>
    </a>

  </div>
</section>

<script>
const cursor = document.getElementById("cursor");

document.addEventListener("mousemove", e => {
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});
</script>

</body>
</html>
